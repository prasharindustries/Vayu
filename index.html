<!DOCTYPE html>
<html lang="hi" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="google" content="notranslate">
    <meta name="theme-color" content="#060c0c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="पवन — 5-7-8 श्वास तकनीक। खोलें, साँस लें, शांत हो जाएँ।">
    <title>पवन · Pawan · 5-7-8 Breathing</title>
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIvCkqvCkrvCkoyIsCiAgInNob3J0X25hbWUiOiAi4KSq4KSu4KSiIiwKICAic3RhcnRfdXJsIjogIi8iLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiMwNjBjMGMiLAogICJ0aGVtZV9jb2xvciI6ICIjMDYwYzBjIiwKICAiaWNvbnMiOiBbXQp9">
    <style>
        :root {
            --bg-deep: #060c0c;
            --bg-surface: #0e1a18;
            --white-soft: #e8e4db;
            --text: #c8c4b8;
            --text-dim: #8a8570;
            --gold: #d4a853;
            --gold-soft: #e8d5a3;
            --teal: #5b9e8a;
            --glow-inhale: rgba(180, 210, 190, 0.5);
            --glow-hold: rgba(220, 190, 130, 0.55);
            --glow-exhale: rgba(110, 170, 145, 0.45);
            --btn-bg: rgba(255, 255, 245, 0.05);
            --btn-border: rgba(255, 255, 240, 0.18);
            --btn-text: #d4cfbf;
            --btn-hover-bg: rgba(255, 255, 245, 0.12);
            --btn-active-bg: rgba(200, 220, 200, 0.18);
            --btn-active-border: rgba(200, 220, 190, 0.5);
            --btn-active-text: #f6f3e8;
            --start-bg: rgba(210, 180, 130, 0.15);
            --start-border: rgba(210, 180, 130, 0.45);
            --start-text: #f8f3e0;
            --start-glow: rgba(180, 140, 80, 0.2);
            --particle-color: rgba(210, 180, 130, 0.55);
            --particle-glow: rgba(210, 180, 130, 0.12);
        }

        .light-mode {
            --bg-deep: #f5f0e8;
            --bg-surface: #e8e2d5;
            --white-soft: #2a2520;
            --text: #4a4540;
            --text-dim: #7a7568;
            --btn-bg: rgba(60, 50, 40, 0.06);
            --btn-border: rgba(60, 50, 40, 0.2);
            --btn-text: #4a453e;
            --btn-hover-bg: rgba(60, 50, 40, 0.14);
            --btn-active-bg: rgba(100, 140, 120, 0.2);
            --btn-active-border: rgba(80, 120, 100, 0.5);
            --btn-active-text: #1a3028;
            --start-bg: rgba(160, 130, 90, 0.2);
            --start-border: rgba(160, 130, 90, 0.5);
            --start-text: #2a2218;
            --start-glow: rgba(140, 110, 60, 0.25);
            --particle-color: rgba(140, 120, 90, 0.4);
            --particle-glow: rgba(140, 120, 90, 0.08);
            --glow-inhale: rgba(120, 160, 140, 0.4);
            --glow-hold: rgba(180, 150, 100, 0.45);
            --glow-exhale: rgba(90, 140, 120, 0.35);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans Devanagari', 'Mangal', 'Lohit Devanagari', 'Georgia', 'Times New Roman', serif;
            background: var(--bg-deep);
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: default;
            transition: background 0.8s ease;
        }

        canvas#particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Language toggle - top right */
        .lang-toggle {
            position: fixed;
            top: 1.2rem;
            right: 1.2rem;
            z-index: 100;
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            color: var(--btn-text);
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.35s ease;
            font-family: inherit;
            white-space: nowrap;
        }
        .lang-toggle:hover {
            background: var(--btn-hover-bg);
            border-color: rgba(255, 255, 240, 0.35);
        }

        /* पवन branding - appears during breathing */
        .brand {
            position: fixed;
            top: 1.2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            font-size: clamp(1.2rem, 3.5vw, 1.8rem);
            color: var(--white-soft);
            letter-spacing: 4px;
            font-weight: 400;
            opacity: 0;
            transition: opacity 0.8s ease, color 0.8s ease;
            text-shadow: 0 2px 15px rgba(0, 0, 0, 0.4);
            pointer-events: none;
        }
        .brand.visible {
            opacity: 0.85;
        }

        /* Theme toggle - bottom right */
        .theme-toggle {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 100;
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            color: var(--btn-text);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.35s ease;
            opacity: 0.5;
        }
        .theme-toggle:hover {
            opacity: 1;
            background: var(--btn-hover-bg);
        }

        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 2rem;
            gap: 0;
        }

        /* Quotes */
        .quote-wrapper {
            text-align: center;
            max-width: 600px;
            width: 100%;
            min-height: 85px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.8rem;
            transition: opacity 0.6s ease;
        }

        .quote-hindi {
            font-size: clamp(1rem, 3vw, 1.4rem);
            color: var(--white-soft);
            letter-spacing: 0.3px;
            line-height: 1.7;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
            animation: quoteFadeIn 1.8s ease forwards;
            transition: color 0.8s ease;
            font-weight: 400;
        }

        .quote-english {
            font-size: clamp(0.9rem, 2.5vw, 1.2rem);
            color: var(--text);
            font-style: italic;
            letter-spacing: 0.3px;
            line-height: 1.5;
            margin-top: 0.3rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            animation: quoteFadeIn 2.2s ease forwards;
            transition: color 0.8s ease;
            display: none;
        }
        .quote-english.show {
            display: block;
        }

        @keyframes quoteFadeIn {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Orb area */
        .orb-container {
            position: relative;
            width: min(250px, 55vw);
            height: min(250px, 55vw);
            margin: 0.4rem 0 1.2rem;
        }

        .orb {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #2a4a3f, #0e2220 70%, #060f0f);
            box-shadow: 0 0 60px rgba(100, 160, 130, 0.25), 0 0 0 1px rgba(255, 255, 240, 0.08);
            transition: transform 0.7s cubic-bezier(0.33, 0.08, 0.21, 0.94),
                box-shadow 0.7s cubic-bezier(0.33, 0.08, 0.21, 0.94),
                background 0.7s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
        }

        .orb-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            transition: all 0.7s cubic-bezier(0.33, 0.08, 0.21, 0.94);
        }

        .orb-glow.ring {
            width: 115%;
            height: 115%;
            box-shadow: 0 0 80px var(--glow-inhale);
            opacity: 0.7;
            transition: all 0.7s cubic-bezier(0.33, 0.08, 0.21, 0.94);
        }

        /* Phase states */
        .phase-inhale .orb {
            transform: scale(1.35);
            background: radial-gradient(circle at 35% 30%, #c8e0d2, #3d6b58 55%, #1a3630);
            box-shadow: 0 0 90px rgba(170, 210, 180, 0.5), 0 0 0 1px rgba(255, 255, 240, 0.18);
        }
        .phase-inhale .orb-glow.ring {
            box-shadow: 0 0 110px var(--glow-inhale);
            opacity: 0.85;
        }

        .phase-hold .orb {
            transform: scale(1.35);
            background: radial-gradient(circle at 35% 30%, #e8d8a8, #6b5a38 55%, #2a2218);
            box-shadow: 0 0 100px rgba(210, 170, 100, 0.55), 0 0 0 1px rgba(255, 250, 220, 0.2);
        }
        .phase-hold .orb-glow.ring {
            box-shadow: 0 0 120px var(--glow-hold);
            opacity: 0.9;
        }

        .phase-exhale .orb {
            transform: scale(0.88);
            background: radial-gradient(circle at 35% 30%, #8cb8a5, #1f4a3a 55%, #0a1f18);
            box-shadow: 0 0 55px rgba(90, 150, 130, 0.4), 0 0 0 1px rgba(255, 255, 240, 0.1);
        }
        .phase-exhale .orb-glow.ring {
            box-shadow: 0 0 70px var(--glow-exhale);
            opacity: 0.6;
        }

        .phase-text {
            color: #f0ece0;
            font-size: clamp(0.85rem, 2vw, 1.1rem);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
            text-shadow: 0 2px 15px rgba(0, 0, 0, 0.7);
            z-index: 5;
            transition: opacity 0.3s;
        }

        /* Countdown overlay */
        .countdown-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .countdown-overlay.active {
            opacity: 1;
        }
        .countdown-number {
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 200;
            color: #f2efe4;
            text-shadow: 0 0 80px rgba(200, 180, 140, 0.8), 0 0 150px rgba(180, 210, 180, 0.4);
            animation: countPulse 0.9s ease-out forwards;
            font-family: 'Georgia', 'Times New Roman', serif;
        }
        @keyframes countPulse {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            40% {
                transform: scale(1.15);
                opacity: 1;
            }
            100% {
                transform: scale(0.7);
                opacity: 0;
            }
        }

        /* Timer */
        .timer {
            font-size: clamp(2.6rem, 7vw, 4.2rem);
            font-weight: 300;
            color: #f2efe4;
            letter-spacing: 5px;
            text-shadow: 0 0 40px rgba(200, 180, 140, 0.6);
            margin: 0.2rem 0 0.4rem;
            font-variant-numeric: tabular-nums;
            font-family: 'Georgia', 'Times New Roman', serif;
            transition: color 0.8s ease;
        }
        .light-mode .timer {
            color: #2a2218;
            text-shadow: 0 0 30px rgba(140, 110, 60, 0.35);
        }

        .round-counter {
            font-size: 0.85rem;
            color: var(--text-dim);
            letter-spacing: 2px;
            margin-bottom: 0.8rem;
            transition: color 0.8s ease;
        }

        /* Controls */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
            align-items: center;
            justify-content: center;
        }

        .btn {
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            color: var(--btn-text);
            padding: 0.65rem 1.4rem;
            border-radius: 40px;
            font-size: 0.85rem;
            letter-spacing: 0.6px;
            cursor: pointer;
            transition: all 0.35s ease;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            font-family: inherit;
            white-space: nowrap;
        }

        .btn:hover {
            background: var(--btn-hover-bg);
            border-color: rgba(255, 255, 240, 0.35);
        }
        .btn.active-mode {
            background: var(--btn-active-bg);
            border-color: var(--btn-active-border);
            color: var(--btn-active-text);
            box-shadow: 0 0 25px rgba(140, 180, 150, 0.25);
        }

        .btn-start,
        .btn-restart {
            background: var(--start-bg);
            border-color: var(--start-border);
            color: var(--start-text);
            font-size: 1.05rem;
            padding: 0.85rem 2.4rem;
            letter-spacing: 1.2px;
            font-weight: 600;
            box-shadow: 0 0 35px var(--start-glow);
            min-width: 150px;
        }
        .btn-start:hover,
        .btn-restart:hover {
            background: rgba(220, 190, 140, 0.25);
            box-shadow: 0 0 50px rgba(190, 150, 90, 0.35);
        }

        .btn-restart {
            border-color: rgba(180, 200, 180, 0.4);
            background: rgba(180, 200, 180, 0.1);
            color: #c8d8c8;
            box-shadow: 0 0 25px rgba(140, 170, 140, 0.15);
            min-width: 120px;
        }
        .light-mode .btn-restart {
            color: #2a3a30;
            background: rgba(120, 150, 130, 0.15);
            border-color: rgba(100, 140, 120, 0.4);
        }
        .btn-restart:hover {
            background: rgba(190, 210, 190, 0.2);
            box-shadow: 0 0 40px rgba(150, 180, 150, 0.3);
        }

        .audio-indicator {
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-top: 0.3rem;
            min-height: 18px;
            transition: opacity 0.4s, color 0.8s ease;
            text-align: center;
        }

        /* PWA hint */
        .pwa-hint {
            position: fixed;
            bottom: 5.5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            background: var(--bg-surface);
            border: 1px solid var(--btn-border);
            color: var(--white-soft);
            padding: 0.75rem 1.4rem;
            border-radius: 30px;
            font-size: 0.8rem;
            letter-spacing: 0.4px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            animation: hintFloat 3s ease-in-out infinite;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.5s ease;
            opacity: 0;
            pointer-events: none;
        }
        .pwa-hint.show {
            opacity: 1;
            pointer-events: auto;
        }
        @keyframes hintFloat {
            0%,
            100% {
                transform: translateX(-50%) translateY(0);
            }
            50% {
                transform: translateX(-50%) translateY(-8px);
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 1rem;
            }
            .btn {
                padding: 0.5rem 1rem;
                font-size: 0.75rem;
            }
            .btn-start,
            .btn-restart {
                padding: 0.65rem 1.6rem;
                font-size: 0.9rem;
                min-width: 130px;
            }
            .btn-restart {
                min-width: 100px;
            }
            .orb-container {
                width: min(200px, 52vw);
                height: min(200px, 52vw);
                margin: 0.3rem 0 0.8rem;
            }
            .lang-toggle {
                top: 0.8rem;
                right: 0.8rem;
                padding: 0.3rem 0.8rem;
                font-size: 0.7rem;
            }
            .brand {
                top: 0.8rem;
                font-size: 1rem;
            }
            .theme-toggle {
                bottom: 1rem;
                right: 1rem;
                width: 38px;
                height: 38px;
                font-size: 1rem;
            }
            .pwa-hint {
                bottom: 4.5rem;
                font-size: 0.7rem;
                padding: 0.5rem 1rem;
            }
            .countdown-number {
                font-size: clamp(4rem, 16vw, 8rem);
            }
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>

    <!-- Language toggle -->
    <button class="lang-toggle" id="langToggle">English →</button>

    <!-- पवन brand -->
    <div class="brand" id="brand">पवन</div>

    <!-- Countdown overlay -->
    <div class="countdown-overlay" id="countdownOverlay">
        <span class="countdown-number" id="countdownNumber"></span>
    </div>

    <div class="container" id="app">
        <!-- Quotes -->
        <div class="quote-wrapper" id="quoteWrapper">
            <div class="quote-hindi" id="quoteHi"></div>
            <div class="quote-english" id="quoteEn"></div>
        </div>

        <!-- Orb -->
        <div class="orb-container" id="orbContainer">
            <div class="orb-glow ring" id="orbRing"></div>
            <div class="orb" id="orb">
                <span class="phase-text" id="phaseLabel">तैयार</span>
            </div>
        </div>

        <!-- Timer -->
        <div class="timer" id="timerDisplay">5</div>
        <div class="round-counter" id="roundCounter">चक्र 0</div>

        <!-- Controls -->
        <div class="controls">
            <button class="btn active-mode" id="visualModeBtn">👁️ दृश्य</button>
            <button class="btn" id="audioModeBtn">🎧 ध्वनि</button>
        </div>
        <div class="controls" style="margin-top:0.3rem;">
            <button class="btn btn-start" id="startBtn">🌿 शुरू करें</button>
            <button class="btn btn-restart" id="restartBtn">↺ पुनः आरंभ</button>
        </div>
        <div class="audio-indicator" id="audioIndicator"></div>
    </div>

    <!-- Dark/Light toggle -->
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">☀️</button>

    <!-- PWA hint -->
    <div class="pwa-hint" id="pwaHint">📲 होम स्क्रीन में जोड़ें</div>

    <script>
        (function() {
            // ─────────────────────────────────────
            // पवन · PAWAN · 5-7-8 Breathing
            // Hindi-first · Countdown · Calm voice · Dark/Light · PWA
            // ─────────────────────────────────────

            // ── Language state ──
            let lang = 'hi'; // 'hi' or 'en'

       // ── Hindi UI strings ──
            const hiStrings = {
                ready: 'तैयार',
                inhale: 'श्वास लें',
                hold: 'रोकें',
                exhale: 'श्वास छोड़ें',
                round: 'चक्र',
                start: '🌿 शुरू करें',
                pause: '⏸️ विराम',
                resume: '🌿 जारी रखें',
                restart: '↺ पुनः आरंभ',
                visual: '👁️ दृश्य',
                audio: '🎧 ध्वनि',
                audioGuide: '🎧 आँखें बंद करें · ध्वनि मार्गदर्शन',
                audioActive: '🎧 आँखें बंद · ध्वनि चल रही है',
                pwaHint: '📲 होम स्क्रीन में जोड़ें',
                countdownVoice: ['तीन', 'दो', 'एक'],
                voiceInhale: 'श्वास लें',
                voiceHold: 'रोकें',
                voiceExhale: 'श्वास छोड़ें',
                voiceInhaleDeep: 'गहरी श्वास लें',
                voiceHoldGentle: 'धीरे से रोकें',
                voiceExhaleSlow: 'धीरे से छोड़ें',
            };

            const enStrings = {
                ready: 'READY',
                inhale: 'Inhale',
                hold: 'Hold',
                exhale: 'Exhale',
                round: 'Round',
                start: '🌿 Start',
                pause: '⏸️ Pause',
                resume: '🌿 Resume',
                restart: '↺ Restart',
                visual: '👁️ Visual',
                audio: '🎧 Audio',
                audioGuide: '🎧 Close your eyes · Voice guide',
                audioActive: '🎧 Eyes closed · Voice active',
                pwaHint: '📲 Add to Home Screen',
                countdownVoice: ['Three', 'Two', 'One'],
                voiceInhale: 'Breathe in',
                voiceHold: 'Hold',
                voiceExhale: 'Breathe out',
                voiceInhaleDeep: 'Inhale deeply',
                voiceHoldGentle: 'Hold gently',
                voiceExhaleSlow: 'Exhale slowly',
            };

            function t(key) {
                return lang === 'hi' ? hiStrings[key] : enStrings[key];
            }

            // ── Quotes Pool ──
            const quotes = [
                { hi: "शांति भीतर से आती है, उसे बाहर मत खोजो।",
                    en: "Peace comes from within. Do not seek it without." },
                { hi: "वर्तमान क्षण आनंद से भरा है। यदि आप ध्यान दें, तो इसे देख लेंगे।",
                    en: "The present moment is filled with joy. If you are attentive, you will see it." },
                { hi: "भावनाएँ बादलों की तरह आती-जाती हैं। सचेत श्वास मेरा सहारा है।",
                    en: "Feelings come and go like clouds. Conscious breathing is my anchor." },
                { hi: "आपके भीतर एक शांति का अभयारण्य है, जहाँ आप कभी भी जा सकते हैं।",
                    en: "Within you is a sanctuary of stillness you can retreat to anytime." },
                { hi: "इस पल में खुश रहो, बस इतना ही काफी है।",
                    en: "Be happy in this moment. That's enough." },
                { hi: "जितने शांत होते हैं, उतना ही अधिक सुन पाते हैं।",
                    en: "The quieter you become, the more you can hear." },
                { hi: "जो सोचते हैं होना चाहिए, उसे छोड़ें और जो है उसे अपनाएँ।",
                    en: "Let go of what should happen and embrace what is." },
                { hi: "आप आकाश हैं। बाकी सब सिर्फ मौसम है।", en: "You are the sky. Everything else is the weather." },
                { hi: "साँस लें साहस। साँस छोड़ें भय।", en: "Inhale courage. Exhale fear." },
                { hi: "यह भी बीत जाएगा। बस साँस लें।", en: "This too shall pass. Just breathe." },
            ];

            function getRandomQuote() {
                return quotes[Math.floor(Math.random() * quotes.length)];
            }

            function setRandomQuote() {
                const q = getRandomQuote();
                const hiEl = document.getElementById('quoteHi');
                const enEl = document.getElementById('quoteEn');
                hiEl.style.animation = 'none';
                enEl.style.animation = 'none';
                hiEl.offsetHeight;
                enEl.offsetHeight;
                hiEl.textContent = `"${q.hi}"`;
                enEl.textContent = `"${q.en}"`;
                hiEl.style.animation = 'quoteFadeIn 1.8s ease forwards';
                enEl.style.animation = 'quoteFadeIn 2.2s ease forwards';
                updateQuoteVisibility();
            }

            function updateQuoteVisibility() {
                const enEl = document.getElementById('quoteEn');
                if (lang === 'en') {
                    enEl.classList.add('show');
                } else {
                    enEl.classList.remove('show');
                }
            }

            setRandomQuote();

            // ── Constants ──
            const INHALE = 5;
            const HOLD = 7;
            const EXHALE = 8;

            // ── State ──
            let phase = 'inhale';
            let timeLeft = INHALE;
            let round = 0;
            let running = false;
            let timerId = null;
            let mode = 'visual';
            let audioCtx = null;

            // ── DOM refs ──
            const orbContainer = document.getElementById('orbContainer');
            const phaseLabel = document.getElementById('phaseLabel');
            const timerDisplay = document.getElementById('timerDisplay');
            const roundCounter = document.getElementById('roundCounter');
            const startBtn = document.getElementById('startBtn');
            const restartBtn = document.getElementById('restartBtn');
            const visualBtn = document.getElementById('visualModeBtn');
            const audioBtn = document.getElementById('audioModeBtn');
            const audioIndicator = document.getElementById('audioIndicator');
            const langToggle = document.getElementById('langToggle');
            const brand = document.getElementById('brand');
            const countdownOverlay = document.getElementById('countdownOverlay');
            const countdownNumber = document.getElementById('countdownNumber');
            const themeToggle = document.getElementById('themeToggle');
            const pwaHint = document.getElementById('pwaHint');

            // ── Haptic ──
            function vibrate(pattern) {
                if (navigator.vibrate) navigator.vibrate(pattern);
            }

            function hapticBump() {
                vibrate([25, 45, 25]);
            }

            // ── Audio ──
            function initAudio() {
                if (!audioCtx) {
                    try { audioCtx = new(window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
                }
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            }

            function playTone(freq, dur, vol = 0.08, type = 'sine') {
                if (!audioCtx) return;
                try {
                    const t = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, t);
                    gain.gain.setValueAtTime(vol, t);
                    gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(t);
                    osc.stop(t + dur);
                } catch (e) {}
            }

            function playPhaseChime(p) {
                if (p === 'inhale') {
                    playTone(440, 0.35, 0.1, 'sine');
                    setTimeout(() => playTone(520, 0.3, 0.07, 'sine'), 120);
                } else if (p === 'hold') {
                    playTone(587, 0.3, 0.09, 'triangle');
                    setTimeout(() => playTone(660, 0.25, 0.06, 'sine'), 100);
                } else if (p === 'exhale') {
                    playTone(392, 0.4, 0.09, 'sine');
                    setTimeout(() => playTone(330, 0.35, 0.07, 'sine'), 150);
                }
            }

            // ── Calm voice using Speech API with Hindi support ──
            function speakCalm(text, isHindi = false) {
                if (!window.speechSynthesis) return;
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = isHindi ? 'hi-IN' : 'en-US';
                u.rate = 0.78;
                u.pitch = 1.0;
                u.volume = 0.85;

                // Try to find a calm female voice
                const voices = window.speechSynthesis.getVoices();
                const preferred = voices.find(v =>
                    (isHindi && v.lang.startsWith('hi')) ||
                    (!isHindi && v.lang.startsWith('en') && v.name.includes('Female'))
                );
                if (preferred) u.voice = preferred;
                else {
                    const anyFemale = voices.find(v => v.name.includes('Female') || v.name.includes('Samantha') || v
                        .name.includes('Karen'));
                    if (anyFemale) u.voice = anyFemale;
                }

                window.speechSynthesis.speak(u);
            }

            function speakPhrase(key) {
                const isHindi = lang === 'hi';
                speakCalm(t(key), isHindi);
            }

            // ── UI Updates ──
            function updateAllLabels() {
                phaseLabel.textContent = running ? t(phase) : t('ready');
                roundCounter.textContent = `${t('round')} ${round}`;
                if (!running) {
                    startBtn.textContent = t('start');
                }
                visualBtn.textContent = t('visual');
                audioBtn.textContent = t('audio');
                restartBtn.textContent = t('restart');
                langToggle.textContent = lang === 'hi' ? 'English →' : 'हिंदी →';
                updateQuoteVisibility();
                if (mode === 'audio' && running) {
                    audioIndicator.textContent = t('audioActive');
                } else if (mode === 'audio' && !running) {
                    audioIndicator.textContent = t('audioGuide');
                } else {
                    audioIndicator.textContent = '';
                }
            }

            function updateUI() {
                timerDisplay.textContent = timeLeft;
                roundCounter.textContent = `${t('round')} ${round}`;
                orbContainer.classList.remove('phase-inhale', 'phase-hold', 'phase-exhale');
                if (phase === 'inhale') {
                    orbContainer.classList.add('phase-inhale');
                    phaseLabel.textContent = t('inhale');
                } else if (phase === 'hold') {
                    orbContainer.classList.add('phase-hold');
                    phaseLabel.textContent = t('hold');
                } else {
                    orbContainer.classList.add('phase-exhale');
                    phaseLabel.textContent = t('exhale');
                }
            }

            function setPhaseCues(p) {
                hapticBump();
                playPhaseChime(p);
                if (mode === 'audio') {
                    if (p === 'inhale') speakPhrase('voiceInhale');
                    else if (p === 'hold') speakPhrase('voiceHold');
                    else speakPhrase('voiceExhale');
                    audioIndicator.textContent = t('audioActive');
                }
            }

            // ── Phase transition ──
            function nextPhase() {
                if (phase === 'inhale') { phase = 'hold';
                    timeLeft = HOLD; } else if (phase === 'hold') { phase = 'exhale';
                    timeLeft = EXHALE; } else { phase = 'inhale';
                    timeLeft = INHALE;
                    round++; }
                updateUI();
                if (running) setPhaseCues(phase);
            }

            function tick() {
                if (!running) return;
                timeLeft--;
                updateUI();
                if (timeLeft <= 0) nextPhase();
            }

            // ── Countdown (3-2-1) ──
            function doCountdown(callback) {
                const numbers = lang === 'hi' ? ['३', '२', '१'] : ['3', '2', '1'];
                const voiceWords = t('countdownVoice');
                // Ensure it's an array
                const words = Array.isArray(voiceWords) ? voiceWords : ['Three', 'Two', 'One'];
                let i = 0;
                countdownOverlay.classList.add('active');

                function showNext() {
                    if (i >= 3) {
                        countdownOverlay.classList.remove('active');
                        countdownNumber.textContent = '';
                        callback();
                        return;
                    }
                    countdownNumber.textContent = numbers[i];
                    countdownNumber.style.animation = 'none';
                    countdownNumber.offsetHeight;
                    countdownNumber.style.animation = 'countPulse 0.9s ease-out forwards';
                    // Speak the word (calm voice)
                    speakCalm(words[i], lang === 'hi');
                    vibrate(80);
                    i++;
                    setTimeout(showNext, 950);
                }
                showNext();
            }

            // ── Start / Pause ──
            function start() {
                if (running) return;
                initAudio();
                // Preload voices
                if (window.speechSynthesis) window.speechSynthesis.getVoices();

                doCountdown(() => {
                    running = true;
                    startBtn.textContent = t('pause');
                    brand.classList.add('visible');
                    updateUI();
                    setPhaseCues(phase);
                    if (timerId) clearInterval(timerId);
                    timerId = setInterval(tick, 1000);
                });
            }

            function pause() {
                if (!running) return;
                running = false;
                if (timerId) { clearInterval(timerId);
                    timerId = null; }
                startBtn.textContent = t('resume');
                if (window.speechSynthesis) window.speechSynthesis.cancel();
                audioIndicator.textContent = mode === 'audio' ? t('audioGuide') : '';
                brand.classList.remove('visible');
            }

            function restart() {
                pause();
                phase = 'inhale';
                timeLeft = INHALE;
                round = 0;
                updateUI();
                orbContainer.classList.remove('phase-inhale', 'phase-hold', 'phase-exhale');
                phaseLabel.textContent = t('ready');
                timerDisplay.textContent = INHALE;
                roundCounter.textContent = `${t('round')} 0`;
                startBtn.textContent = t('start');
                audioIndicator.textContent = '';
                brand.classList.remove('visible');
                if (window.speechSynthesis) window.speechSynthesis.cancel();
            }

            startBtn.addEventListener('click', () => {
                if (running) pause();
                else start();
            });
            restartBtn.addEventListener('click', restart);

// ── Mode switching ──
            function setVisual() {
                mode = 'visual';
                visualBtn.classList.add('active-mode');
                audioBtn.classList.remove('active-mode');
                audioIndicator.textContent = '';
                if (running && window.speechSynthesis) window.speechSynthesis.cancel();
            }

            function setAudio() {
                mode = 'audio';
                audioBtn.classList.add('active-mode');
                visualBtn.classList.remove('active-mode');
                audioIndicator.textContent = running ? t('audioActive') : t('audioGuide');
                if (running) {
                    if (phase === 'inhale') speakPhrase('voiceInhaleDeep');
                    else if (phase === 'hold') speakPhrase('voiceHoldGentle');
                    else speakPhrase('voiceExhaleSlow');
                }
            }

            visualBtn.addEventListener('click', setVisual);
            audioBtn.addEventListener('click', setAudio);

            // ── Language toggle ──
            langToggle.addEventListener('click', () => {
                lang = lang === 'hi' ? 'en' : 'hi';
                updateAllLabels();
                updateUI();
                if (!running) {
                    phaseLabel.textContent = t('ready');
                    timerDisplay.textContent = timeLeft;
                    roundCounter.textContent = `${t('round')} ${round}`;
                }
                if (mode === 'audio' && running) {
                    audioIndicator.textContent = t('audioActive');
                }
                setRandomQuote();
            });

            // ── Theme toggle ──
            let isDark = true;
            themeToggle.addEventListener('click', () => {
                isDark = !isDark;
                if (isDark) {
                    document.body.classList.remove('light-mode');
                    themeToggle.textContent = '☀️';
                    document.querySelector('meta[name="theme-color"]').content = '#060c0c';
                } else {
                    document.body.classList.add('light-mode');
                    themeToggle.textContent = '🌙';
                    document.querySelector('meta[name="theme-color"]').content = '#f5f0e8';
                }
            });

            // ── PWA hint ──
            function showPwaHint() {
                const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
                const isIOS = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
                if (!isStandalone && isIOS && !localStorage.getItem('pawan-pwa-dismissed')) {
                    pwaHint.textContent = t('pwaHint');
                    pwaHint.classList.add('show');
                }
            }
            pwaHint.addEventListener('click', () => {
                pwaHint.classList.remove('show');
                localStorage.setItem('pawan-pwa-dismissed', 'true');
            });
            setTimeout(() => pwaHint.classList.remove('show'), 12000);
            window.addEventListener('load', showPwaHint);

            // ── Particles ──
            const canvas = document.getElementById('particles');
            const ctx = canvas.getContext('2d');
            let particlesArr = [];
            const PC = 65;

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            class Particle {
                constructor() { this.reset(); }
                reset() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.r = Math.random() * 1.6 + 0.4;
                    this.speed = Math.random() * 0.3 + 0.1;
                    this.opacity = Math.random() * 0.5 + 0.18;
                    this.wobble = Math.random() * Math.PI * 2;
                }
                update() {
                    this.y -= this.speed;
                    this.wobble += 0.007;
                    this.x += Math.sin(this.wobble) * 0.2;
                    if (this.y < -10) { this.y = canvas.height + 10;
                        this.x = Math.random() * canvas.width; }
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(210,180,130,${this.opacity})`;
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.r * 2.2, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(210,180,130,${this.opacity*0.1})`;
                    ctx.fill();
                }
            }
            for (let i = 0; i < PC; i++) particlesArr.push(new Particle());

            function animParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (const p of particlesArr) { p.update();
                    p.draw(); }
                requestAnimationFrame(animParticles);
            }
            animParticles();
// ── Service Worker ──
            if ('serviceWorker' in navigator) {
                const swCode = `
            const C='pawan-v2';
            self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['/'])).then(()=>self.skipWaiting()))});
            self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(x=>x!==C).map(x=>caches.delete(x)))).then(()=>self.clients.claim()))});
            self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{if(res.ok){const cl=res.clone();caches.open(C).then(c=>c.put(e.request,cl));}return res;})))});
          `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
            }

            // ── Init ──
            updateAllLabels();
            phaseLabel.textContent = t('ready');
            timerDisplay.textContent = INHALE;
            roundCounter.textContent = `${t('round')} 0`;
            startBtn.textContent = t('start');
            restartBtn.textContent = t('restart');
        })();
    </script>
</body>
</html>
