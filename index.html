        .theme-toggle {

            position:relative; z-index:10;

            text-align:center; max-width:600px; width:100%;
            min-height:60px; display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            margin-bottom:0.3rem; transition:opacity 0.6s ease;
            position:relative; z-index:20;
        }
        .quote-hindi {
            font-size:clamp(0.9rem,2.5vw,1.2rem); color:var(--text);
            letter-spacing:0.3px; line-height:1.5;

        .technique-section {

        .technique-label {
            color: var(--text-dim);
            font-size: 0.8rem;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;

        .technique-selector {
            display:flex; gap:0.5rem; flex-wrap:wrap;
            justify-content:center;
        }
        .tech-btn {
            background:var(--btn-bg); border:1px solid var(--btn-border);

            backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
            font-family:inherit; white-space:nowrap;

        .tech-btn:hover { background:var(--btn-hover); }

            color:var(--btn-active-text); box-shadow:0 0 20px rgba(140,180,150,0.3);
            font-weight:600;
        }

}

        .orb-section {
            position:relative; z-index:5;
            display:flex; align-items:center; justify-content:center;
            width:min(230px,50vw); height:min(230px,50vw);
            margin:0.3rem 0 0.8rem;
            flex-shrink:0;
        }
        .orb-container {
            position:absolute;
            top:50%; left:50%;
            transform:translate(-50%,-50%);
            width:100%; height:100%;
        }
        .orb {
            width:100%; height:100%; border-radius:50%;
            background:radial-gradient(circle at 35% 30%, #3a5a4a, #1a3028 70%, #0a1a14);
            box-shadow:0 0 50px rgba(100,160,130,0.2), 0 0 0 1px rgba(255,255,240,0.06);
            transition: transform 0.7s cubic-bezier(0.33,0.08,0.21,0.94),
                box-shadow 0.7s cubic-bezier(0.33,0.08,0.21,0.94),
                background 0.7s ease;
            display:flex; align-items:center; justify-content:center;
            position:relative; z-index:2;
        }
        .orb-glow {
            position:absolute; top:50%; left:50%;
            transform:translate(-50%,-50%);
            width:100%; height:100%; border-radius:50%;
            pointer-events:none; z-index:1;
            transition:all 0.7s cubic-bezier(0.33,0.08,0.21,0.94);
        }
        .orb-glow.ring {
            width:115%; height:115%;
            box-shadow:0 0 70px var(--glow-inhale); opacity:0.65;
        }
        .phase-inhale .orb {
            transform:scale(1.3);
            background:radial-gradient(circle at 35% 30%, #c0dcc8, #4a7a60 55%, #1a3a2a);
            box-shadow:0 0 80px rgba(160,200,170,0.45), 0 0 0 1px rgba(255,255,240,0.15);
        }
        .phase-inhale .orb-glow.ring { box-shadow:0 0 100px var(--glow-inhale); opacity:0.8; }
        .phase-hold .orb {
            transform:scale(1.3);
            background:radial-gradient(circle at 35% 30%, #e8d8a0, #7a6a40 55%, #2a2218);
            box-shadow:0 0 90px rgba(210,170,100,0.5), 0 0 0 1px rgba(255,250,220,0.18);
        }
        .phase-hold .orb-glow.ring { box-shadow:0 0 110px var(--glow-hold); opacity:0.85; }
        .phase-exhale .orb {
            transform:scale(0.9);
            background:radial-gradient(circle at 35% 30%, #90c0a8, #2a5040 55%, #0a1f18);
            box-shadow:0 0 50px rgba(90,150,130,0.35), 0 0 0 1px rgba(255,255,240,0.08);
        }
        .phase-exhale .orb-glow.ring { box-shadow:0 0 60px var(--glow-exhale); opacity:0.55; }

        .phase-text {
            color:#f0ece0; font-size:clamp(0.8rem,1.8vw,1rem);
            letter-spacing:2px; text-transform:uppercase; font-weight:600;
            text-shadow:0 2px 15px rgba(0,0,0,0.6); z-index:5;
        }
        .progress-ring {
            position:absolute; top:50%; left:50%;
            transform:translate(-50%,-50%);
            width:120%; height:120%; pointer-events:none; z-index:3;
        }
        .progress-ring circle {
            fill:none; stroke:rgba(210,180,130,0.4);
            stroke-width:2; stroke-linecap:round;
            transition:stroke-dashoffset 1.0s linear, stroke 0.7s ease;
        }

        .countdown-overlay {
            position:fixed; top:0; left:0; width:100%; height:100%;
            z-index:200; display:flex; align-items:center; justify-content:center;
            pointer-events:none; opacity:0; transition:opacity 0.3s ease;
            background:rgba(0,0,0,0.2);
        }
        .countdown-overlay.active { opacity:1; }
        .countdown-number {
            font-size:clamp(5rem,18vw,11rem); font-weight:200;
            color:#f2efe4; text-shadow:0 0 80px rgba(200,180,140,0.8);
            animation:countPulse 0.9s ease-out forwards;
            font-family:'Georgia','Times New Roman',serif;
        }
        @keyframes countPulse {
            0% { transform:scale(0.4); opacity:0; }
            40% { transform:scale(1.2); opacity:1; }
            100% { transform:scale(0.6); opacity:0; }
        }

        .timer-section {
            position:relative; z-index:20;
            display:flex; flex-direction:column; align-items:center;
            margin-bottom:0.3rem;
        }
        .timer {
            font-size:clamp(2.4rem,6vw,3.8rem); font-weight:300;
            color:#f2efe4; letter-spacing:5px;
            text-shadow:0 0 35px rgba(200,180,140,0.5);
            font-variant-numeric:tabular-nums;
            font-family:'Georgia','Times New Roman',serif;
        }
        .light-mode .timer { color:#2a2218; text-shadow:0 0 25px rgba(140,110,60,0.3); }

        .round-counter {
            font-size: 1rem;
            color: var(--text-dim);
            letter-spacing: 2px;
            margin-top: 0.1rem;
            font-weight: 500;
        }

        .controls {
            position:relative; z-index:20;
            display:flex; flex-wrap:wrap; gap:0.6rem;
            align-items:center; justify-content:center;
            margin-top:0.2rem;
        }
        .btn {
            background:var(--btn-bg); border:1px solid var(--btn-border);
            color:var(--btn-text); padding:0.45rem 1rem;
            border-radius:30px; font-size:0.75rem; letter-spacing:0.5px;
            cursor:pointer; transition:all 0.3s ease;
            backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
            font-family:inherit; white-space:nowrap;
        }
        .btn:hover { background:var(--btn-hover); }
        .btn.active-mode {
            background:var(--btn-active-bg); border-color:var(--btn-active-border);
            color:var(--btn-active-text); box-shadow:0 0 20px rgba(140,180,150,0.25);
        }
        .btn-start, .btn-restart {
            background:var(--start-bg); border-color:var(--start-border);
            color:var(--start-text);
            font-size: 1.15rem;
            padding: 0.8rem 2.2rem;
            letter-spacing:1.2px; font-weight:600;
            min-width:160px;
            border-radius:35px;
        }
        .btn-start-sub {
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 0.8px;
            margin-top: 0.15rem;
            text-align: center;
            opacity: 0.7;
        }
        .btn-restart {
            background:rgba(160,190,170,0.12); border-color:rgba(160,190,170,0.4);
            color:var(--text); min-width:110px; font-size:1rem; padding:0.7rem 1.6rem;
        }

        .audio-indicator {
            position:relative; z-index:20;
            font-size:0.7rem; color:var(--text-dim); letter-spacing:0.8px;
            margin-top:0.2rem; min-height:16px; text-align:center;
        }

        .break-dialog {
            position:fixed; top:0; left:0; width:100%; height:100%;
            z-index:300; display:flex; align-items:center; justify-content:center;
            pointer-events:none; opacity:0; transition:opacity 0.4s ease;
            background:rgba(0,0,0,0.5);
        }
        .break-dialog.active { opacity:1; pointer-events:auto; }
        .break-card {
            background:var(--card-bg); border:1px solid var(--btn-border);
            border-radius:24px; padding:2rem 1.8rem;
            text-align:center; max-width:340px; width:90%;
            backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
            box-shadow:0 20px 50px rgba(0,0,0,0.4);
            animation:dialogIn 0.5s ease;
        }
        @keyframes dialogIn {
            from { transform:scale(0.85); opacity:0; }
            to { transform:scale(1); opacity:1; }
        }
        .break-title {
            font-size:1.2rem; color:var(--white-soft); margin-bottom:0.5rem;
            letter-spacing:0.5px;
        }
        .break-subtitle {
            font-size:0.85rem; color:var(--text-dim); margin-bottom:1.2rem;
            line-height:1.5;
        }
        .break-buttons {
            display:flex; gap:0.8rem; justify-content:center; flex-wrap:wrap;
        }
        .break-btn {
            padding:0.6rem 1.4rem; border-radius:30px; font-size:0.85rem;
            cursor:pointer; font-family:inherit; letter-spacing:0.5px;
            transition:all 0.3s ease; border:1px solid var(--btn-border);
        }
        .break-btn.primary {
            background:var(--start-bg); border-color:var(--start-border);
            color:var(--start-text); font-weight:600;
        }
        .break-btn.secondary {
            background:var(--btn-bg); color:var(--btn-text);
        }

        .pwa-hint {
            position:fixed; bottom:5rem; left:50%; transform:translateX(-50%);
            z-index:200; background:var(--card-bg); border:1px solid var(--btn-border);
            color:var(--text); padding:0.7rem 1.3rem; border-radius:30px;
            font-size:0.75rem; letter-spacing:0.4px;
            backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
            box-shadow:0 8px 25px rgba(0,0,0,0.3);
            animation:hintFloat 3s ease-in-out infinite;
            cursor:pointer; white-space:nowrap;
            opacity:0; pointer-events:none; transition:opacity 0.5s;
        }
        .pwa-hint.show { opacity:1; pointer-events:auto; }
        @keyframes hintFloat {
            0%,100% { transform:translateX(-50%) translateY(0); }
            50% { transform:translateX(-50%) translateY(-6px); }
        }

        @media (max-width:480px) {
            .container { padding:0.8rem; }
            .btn { padding:0.4rem 0.8rem; font-size:0.7rem; }
            .btn-start, .btn-restart { padding:0.65rem 1.6rem; font-size:1rem; min-width:130px; }
            .btn-restart { min-width:90px; font-size:0.85rem; padding:0.55rem 1.2rem; }
            .orb-section { width:min(170px,45vw); height:min(170px,45vw); margin:0.2rem 0 0.5rem; }
            .tech-btn { padding:0.35rem 0.7rem; font-size:0.7rem; }
            .break-card { padding:1.5rem 1.2rem; }
            .round-counter { font-size:0.85rem; }
            .btn-start-sub { font-size:0.65rem; }
        }
    </style>

            <div class="orb-container" id="orbContainer">
                <div class="orb-glow ring" id="orbRing"></div>
                <div class="orb" id="orb">
                    <svg class="progress-ring" id="progressRing" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="46" id="progressCircle"/>
                    </svg>
                    <span class="phase-text" id="phaseLabel">तैयार</span>
                </div>
            </div>
        </div>

        <div class="timer-section">
            <div class="timer" id="timerDisplay">5</div>
            <div class="round-counter" id="roundCounter">चक्र 0</div>
        </div>

        <div class="controls">
            <button class="btn" id="visualModeBtn">👁️ दृश्य</button>
            <button class="btn active-mode" id="audioModeBtn">🎧 ध्वनि</button>
        </div>
        <div class="controls" style="margin-top:0.25rem;">
            <button class="btn btn-start" id="startBtn">🌿 शुरू करें</button>
            <button class="btn btn-restart" id="restartBtn">↺ पुनः आरंभ</button>
        </div>
        <div class="btn-start-sub" id="startSub">प्रारंभ</div>
        <div class="audio-indicator" id="audioIndicator">🎧 ध्वनि मार्गदर्शन</div>
    </div>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">☀️</button>

    <div class="pwa-hint" id="pwaHint">📲 होम स्क्रीन में जोड़ें</div>
    <div class="pwa-hint" id="tapHint" style="bottom:8rem;">👆 कहीं भी टैप करें</div>

    <script>
        (function() {
            let lang = 'hi';
            let technique = '578';
            let INHALE=5, HOLD=7, EXHALE=8;
            let phase='inhale', timeLeft=INHALE, round=0, running=false, timerId=null;
            let mode='audio';
            let audioCtx=null;
            let roundsBeforeBreak = 3; // Show break after every 3 rounds
            let breakActive = false;
            let countdownActive = false;

            const techniques = {
                '345': { inhale:3, hold:4, exhale:5, hi:'3-4-5 · सरल', en:'3-4-5 · Easy' },
                '478': { inhale:4, hold:7, exhale:8, hi:'4-7-8 · मध्यम', en:'4-7-8 · Medium' },
                '578': { inhale:5, hold:7, exhale:8, hi:'5-7-8 · उन्नत', en:'5-7-8 · Advanced' }
            };

            const hiStrings = {
                ready:'तैयार', inhale:'श्वास लें', hold:'रोकें', exhale:'श्वास छोड़ें',
                round:'चक्र', start:'🌿 शुरू करें', pause:'⏸️ विराम', resume:'🌿 जारी रखें',
                restart:'↺ पुनः आरंभ', visual:'👁️ दृश्य', audio:'🎧 ध्वनि',
                audioGuide:'🎧 ध्वनि मार्गदर्शन', audioActive:'🎧 ध्वनि चल रही है',
                pwaHint:'📲 होम स्क्रीन में जोड़ें',
                countdownVoice:['तीन','दो','एक'],
                voiceInhale:'श्वास लें', voiceHold:'रोकें', voiceExhale:'श्वास छोड़ें',
                voiceInhaleDeep:'गहरी श्वास लें', voiceHoldGentle:'धीरे से रोकें', voiceExhaleSlow:'धीरे से छोड़ें',
                breakContinue:'▶ जारी रखें', breakRest:'⏸ 30 सेकंड विराम',
                breakCountdown:'विराम: ',
                techniqueLabel:'अपनी गति चुनें',
                startSub:'प्रारंभ'
            };
            const enStrings = {
                ready:'READY', inhale:'Inhale', hold:'Hold', exhale:'Exhale',
                round:'Round', start:'🌿 Start', pause:'⏸️ Pause', resume:'🌿 Resume',
                restart:'↺ Restart', visual:'👁️ Visual', audio:'🎧 Audio',
                audioGuide:'🎧 Audio guide', audioActive:'🎧 Voice active',
                pwaHint:'📲 Add to Home Screen',
                countdownVoice:['Three','Two','One'],
                voiceInhale:'Breathe in', voiceHold:'Hold', voiceExhale:'Breathe out',
                voiceInhaleDeep:'Inhale deeply', voiceHoldGentle:'Hold gently', voiceExhaleSlow:'Exhale slowly',
                breakContinue:'▶ Continue', breakRest:'⏸ 30 sec break',
                breakCountdown:'Break: ',
                techniqueLabel:'Choose your pace',
                startSub:'Begin'
            };
            function t(k){ return lang==='hi' ? hiStrings[k] : enStrings[k]; }

            const quotes = [
                { hi:"शांति भीतर से आती है, उसे बाहर मत खोजो।", en:"Peace comes from within. Do not seek it without." },
                { hi:"वर्तमान क्षण आनंद से भरा है। यदि आप ध्यान दें, तो इसे देख लेंगे।", en:"The present moment is filled with joy. If you are attentive, you will see it." },
                { hi:"भावनाएँ बादलों की तरह आती-जाती हैं। सचेत श्वास मेरा सहारा है।", en:"Feelings come and go like clouds. Conscious breathing is my anchor." },
                { hi:"आपके भीतर एक शांति का अभयारण्य है।", en:"Within you is a sanctuary of stillness." },
                { hi:"इस पल में खुश रहो, बस इतना ही काफी है।", en:"Be happy in this moment. That's enough." },
                { hi:"जितने शांत होते हैं, उतना ही अधिक सुन पाते हैं।", en:"The quieter you become, the more you can hear." },
                { hi:"आप आकाश हैं। बाकी सब सिर्फ मौसम है।", en:"You are the sky. Everything else is the weather." },
                { hi:"साँस लें साहस। साँस छोड़ें भय।", en:"Inhale courage. Exhale fear." },
                { hi:"यह भी बीत जाएगा। बस साँस लें।", en:"This too shall pass. Just breathe." },
            ];

            function randomQuote(){ return quotes[Math.floor(Math.random()*quotes.length)]; }
            function setQuote(){
                const q=randomQuote();
                const hi=document.getElementById('quoteHi'), en=document.getElementById('quoteEn');
                hi.style.animation='none'; en.style.animation='none';
                hi.offsetHeight; en.offsetHeight;
                hi.textContent=`"${q.hi}"`; en.textContent=`"${q.en}"`;
                hi.style.animation='quoteIn 1.8s ease forwards';
                en.style.animation='quoteIn 2.2s ease forwards';
                updateQuoteVis();
            }
            function updateQuoteVis(){
                document.getElementById('quoteEn').classList.toggle('show', lang==='en');
            }
            setQuote();

            const orbContainer=document.getElementById('orbContainer'),
                phaseLabel=document.getElementById('phaseLabel'),
                timerDisplay=document.getElementById('timerDisplay'),
                roundCounter=document.getElementById('roundCounter'),
                startBtn=document.getElementById('startBtn'),
                restartBtn=document.getElementById('restartBtn'),
                visualBtn=document.getElementById('visualModeBtn'),
                audioBtn=document.getElementById('audioModeBtn'),
                audioIndicator=document.getElementById('audioIndicator'),
                langToggle=document.getElementById('langToggle'),
                brand=document.getElementById('brand'),
                countdownOverlay=document.getElementById('countdownOverlay'),
                countdownNumber=document.getElementById('countdownNumber'),
                themeToggle=document.getElementById('themeToggle'),
                pwaHint=document.getElementById('pwaHint'),
                breakDialog=document.getElementById('breakDialog'),
                breakTitle=document.getElementById('breakTitle'),
                breakSubtitle=document.getElementById('breakSubtitle'),
                breakContinue=document.getElementById('breakContinue'),
                breakRest=document.getElementById('breakRest'),
                techniqueSelector=document.getElementById('techniqueSelector'),
                techniqueLabel=document.getElementById('techniqueLabel'),
                startSub=document.getElementById('startSub');

            function setTechnique(tech){
                technique=tech;
                const tData=techniques[tech];
                INHALE=tData.inhale; HOLD=tData.hold; EXHALE=tData.exhale;
                document.querySelectorAll('.tech-btn').forEach(b=>b.classList.remove('active-tech'));
                document.querySelector(`[data-tech="${tech}"]`).classList.add('active-tech');
                if(!running && !countdownActive){
                    phase='inhale'; timeLeft=INHALE; round=0;
                    updateUI(); updateAllLabels();
                    timerDisplay.textContent=INHALE;
                    roundCounter.textContent=`${t('round')} 0`;
                    phaseLabel.textContent=t('ready');
                    orbContainer.classList.remove('phase-inhale','phase-hold','phase-exhale');
                }
            }

            techniqueSelector.addEventListener('click',(e)=>{
                const btn=e.target.closest('.tech-btn');
                if(!btn) return;
                setTechnique(btn.dataset.tech);
            });

            function vibrate(p){ if(navigator.vibrate) navigator.vibrate(p); }
            function haptic(){ vibrate([20,40,20]); }

            function initAudio(){
                if(!audioCtx){ try{ audioCtx=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
                if(audioCtx&&audioCtx.state==='suspended') audioCtx.resume();
            }
            let voicesLoaded=false;
            function preloadVoices(){
                if(voicesLoaded) return;
                if(window.speechSynthesis){
                    const voices=window.speechSynthesis.getVoices();
                    if(voices.length>0) voicesLoaded=true;
                    window.speechSynthesis.onvoiceschanged=()=>{ voicesLoaded=true; };
                }
            }
            document.addEventListener('click',preloadVoices,{once:true});
            document.addEventListener('touchstart',preloadVoices,{once:true});
            
            function playTone(f,d,v=0.08,type='sine'){
                if(!audioCtx) return;
                try{
                    const t=audioCtx.currentTime;
                    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
                    o.type=type; o.frequency.setValueAtTime(f,t);
                    g.gain.setValueAtTime(v,t); g.gain.exponentialRampToValueAtTime(0.0001,t+d);
                    o.connect(g); g.connect(audioCtx.destination);
                    o.start(t); o.stop(t+d);
                }catch(e){}
            }
            function chime(p){
                if(p==='inhale'){ playTone(440,0.35,0.1); setTimeout(()=>playTone(520,0.3,0.07),120); }
                else if(p==='hold'){ playTone(587,0.3,0.09,'triangle'); setTimeout(()=>playTone(660,0.25,0.06),100); }
                else{ playTone(392,0.4,0.09); setTimeout(()=>playTone(330,0.35,0.07),150); }
            }
            
            function speakCalm(text,isHi=false){
                if(!window.speechSynthesis) return;
                window.speechSynthesis.cancel();
                const u=new SpeechSynthesisUtterance(text);
                u.lang=isHi?'hi-IN':'en-US'; u.rate=0.78; u.pitch=1.0; u.volume=0.85;
                const voices=window.speechSynthesis.getVoices();
                const pref=voices.find(v=>(isHi&&v.lang.startsWith('hi'))||(!isHi&&v.lang.startsWith('en')&&v.name.includes('Female')));
                if(pref) u.voice=pref;
                window.speechSynthesis.speak(u);
            }

            function updateAllLabels(){
                if(!running && !countdownActive){ phaseLabel.textContent=t('ready'); startBtn.textContent=t('start'); }
                visualBtn.textContent=t('visual'); audioBtn.textContent=t('audio');
                restartBtn.textContent=t('restart');
                langToggle.textContent=lang==='hi'?'English →':'हिंदी →';
                techniqueLabel.textContent=t('techniqueLabel');
                startSub.textContent=t('startSub');
                updateQuoteVis();
                if(mode==='audio'&&running && !breakActive) audioIndicator.textContent=t('audioActive');
                else if(mode==='audio'&&!running) audioIndicator.textContent=t('audioGuide');
                else audioIndicator.textContent='';
            }
            
            function updateUI(){
                timerDisplay.textContent=timeLeft;
                roundCounter.textContent=`${t('round')} ${round}`;
                orbContainer.classList.remove('phase-inhale','phase-hold','phase-exhale');
                if(phase==='inhale'){ orbContainer.classList.add('phase-inhale'); phaseLabel.textContent=t('inhale'); }
                else if(phase==='hold'){ orbContainer.classList.add('phase-hold'); phaseLabel.textContent=t('hold'); }
                else{ orbContainer.classList.add('phase-exhale'); phaseLabel.textContent=t('exhale'); }
                updateProgressRing();
            }
            
            function updateProgressRing(){
                const circle=document.getElementById('progressCircle');
                if(!circle) return;
                const total=phase==='inhale'?INHALE:phase==='hold'?HOLD:EXHALE;
                const circumference=2*Math.PI*46;
                const progress = (total - timeLeft) / total;
                const offset=circumference * (1 - progress);
                circle.style.strokeDasharray=`${circumference} ${circumference}`;
                circle.style.strokeDashoffset=offset;
                circle.style.transform='rotate(-90deg)';
                circle.style.transformOrigin='50% 50%';
                if(phase==='inhale') circle.style.stroke='rgba(160,210,180,0.6)';
                else if(phase==='hold') circle.style.stroke='rgba(220,190,130,0.6)';
                else circle.style.stroke='rgba(120,180,150,0.5)';
            }
            
            function setCues(p){
                haptic(); chime(p);
                if(mode==='audio' && !breakActive && !countdownActive){
                    if(p==='inhale') speakCalm(t('voiceInhale'), lang==='hi');
                    else if(p==='hold') speakCalm(t('voiceHold'), lang==='hi');
                    else speakCalm(t('voiceExhale'), lang==='hi');
                    audioIndicator.textContent=t('audioActive');
                }
            }

            function nextPhase(){
                if(phase==='inhale'){ phase='hold'; timeLeft=HOLD; }
                else if(phase==='hold'){ phase='exhale'; timeLeft=EXHALE; }
                else{
                    phase='inhale'; timeLeft=INHALE; round++;
                    if(running && round > 0 && round % roundsBeforeBreak === 0) {
                        showBreakDialog();
                    }
                }
                updateUI();
                updateProgressRing();
                if(running && !breakActive) setCues(phase);
            }
            
            function tick(){
                if(!running || breakActive || countdownActive) return;
                timeLeft--;
                updateUI();
                if(timeLeft<=0){
                    updateProgressRing();
                    nextPhase();
                }
            }

            function showBreakDialog(){
                breakActive=true;
                if(window.speechSynthesis) window.speechSynthesis.cancel();
                breakTitle.textContent = lang === 'hi' ? 
                    `शानदार! आपने ${round} चक्र पूरे कर लिए।` : 
                    `Wonderful! You completed ${round} rounds.`;
                breakSubtitle.innerHTML = lang === 'hi' ? 
                    'अगला चक्र जारी रखें या 30 सेकंड का विराम लें?' : 
                    'Continue with the next round or take a 30-second break?';
                breakContinue.textContent = t('breakContinue');
                breakRest.textContent = t('breakRest');
                breakDialog.classList.add('active');
                document.body.style.background='#2a3a20';
                setTimeout(()=>{ document.body.style.background=''; }, 500);
            }
            function hideBreakDialog(){
                breakDialog.classList.remove('active');
                breakActive=false;
            }
            function doBreakCountdown(cb){
                let sec=30;
                breakTitle.textContent=lang==='hi'?'⏸ विराम':'⏸ Break';
                breakSubtitle.innerHTML=`${t('breakCountdown')}<strong>${sec}</strong>`;
                breakContinue.style.display='none'; breakRest.style.display='none';
                const int=setInterval(()=>{
                    sec--;
                    if(sec<=0){ clearInterval(int); hideBreakDialog(); cb(); }
                    else{ breakSubtitle.innerHTML=`${t('breakCountdown')}<strong>${sec}</strong>`; }
                },1000);
            }
            
            breakContinue.addEventListener('click',()=>{
                hideBreakDialog();
                if(window.speechSynthesis) window.speechSynthesis.cancel();
                doCountdown(()=>{
                    if(timerId) clearInterval(timerId);
                    timerId=setInterval(tick,1000);
                });
            });
            
            breakRest.addEventListener('click',()=>{
                doBreakCountdown(()=>{
                    hideBreakDialog();
                    if(window.speechSynthesis) window.speechSynthesis.cancel();
                    doCountdown(()=>{
                        if(timerId) clearInterval(timerId);
                        timerId=setInterval(tick,1000);
                    });
                });
            });

            function doCountdown(cb){
                countdownActive = true;
                const nums=lang==='hi'?['३','२','१']:['3','2','1'];
                const words=t('countdownVoice');
                const w=Array.isArray(words)?words:['Three','Two','One'];
                let i=0;
                countdownOverlay.classList.add('active');
                function show(){
                    if(i>=3){ 
                        countdownOverlay.classList.remove('active'); 
                        countdownNumber.textContent=''; 
                        countdownActive = false;
                        cb(); 
                        return; 
                    }
                    countdownNumber.textContent=nums[i];
                    countdownNumber.style.animation='none'; 
                    countdownNumber.offsetHeight;
                    countdownNumber.style.animation='countPulse 0.9s ease-out forwards';
                    speakCalm(w[i],lang==='hi'); 
                    vibrate(80);
                    i++; 
                    setTimeout(show,950);
                }
                show();
            }

            function start(){
                if(running || countdownActive) return;
                initAudio();
                preloadVoices();
                doCountdown(()=>{
                    running=true; 
                    startBtn.textContent=t('pause');
                    brand.classList.add('visible');
                    startSub.textContent = lang==='hi' ? 'विराम' : 'Pause';
                    updateUI();
                    if(timerId) clearInterval(timerId);
                    timerId=setInterval(tick,1000);
                    // Speak first inhale cue
                    if(mode==='audio') setCues('inhale');
                });
            }
            function pause(){
                if(!running) return;
                running=false;
                if(timerId){ clearInterval(timerId); timerId=null; }
                startBtn.textContent=t('resume');
                startSub.textContent=t('startSub');
                if(window.speechSynthesis) window.speechSynthesis.cancel();
                audioIndicator.textContent=mode==='audio'?t('audioGuide'):'';
                brand.classList.remove('visible');
            }
            function restart(){
                pause(); hideBreakDialog();
                phase='inhale'; timeLeft=INHALE; round=0;
                updateProgressRing();
                updateUI();
                orbContainer.classList.remove('phase-inhale','phase-hold','phase-exhale');
                phaseLabel.textContent=t('ready');
                timerDisplay.textContent=INHALE;
                roundCounter.textContent=`${t('round')} 0`;
                startBtn.textContent=t('start');
                startSub.textContent=t('startSub');
                audioIndicator.textContent=mode==='audio'?t('audioGuide'):'';
                brand.classList.remove('visible');
                if(window.speechSynthesis) window.speechSynthesis.cancel();
                document.body.style.background='';
                countdownActive = false;
            }

            startBtn.addEventListener('click',()=>{ if(running) pause(); else start(); });
            restartBtn.addEventListener('click', restart);
            document.addEventListener('click',(e)=>{
                document.getElementById('tapHint').classList.remove('show');
                localStorage.setItem('pawan-tap-hint','true');
                if(running || breakActive || countdownActive) return;
                if(e.target.closest('button') || e.target.closest('.break-dialog')) return;
                start();
            });

            function setVisual(){
                mode='visual'; visualBtn.classList.add('active-mode');
                audioBtn.classList.remove('active-mode');
                audioIndicator.textContent='';
                startSub.textContent = running ? (lang==='hi'?'विराम':'Pause') : t('startSub');
                if(running&&window.speechSynthesis) window.speechSynthesis.cancel();
            }
            function setAudio(){
                mode='audio'; audioBtn.classList.add('active-mode');
                visualBtn.classList.remove('active-mode');
                audioIndicator.textContent=running?t('audioActive'):t('audioGuide');
                startSub.textContent = running ? (lang==='hi'?'विराम':'Pause') : t('startSub');
            }
            visualBtn.addEventListener('click',setVisual);
            audioBtn.addEventListener('click',setAudio);

            langToggle.addEventListener('click',()=>{
    lang=lang==='hi'?'en':'hi';
    updateAllLabels(); updateUI();
    document.getElementById('disclaimerText').textContent = 
        lang === 'hi' ? 
        '🕉️ यदि सही तरीके से किया जाए तो 4-5 चक्र पर्याप्त हैं। इसे ज़बरदस्ती न करें।' : 
        '🕉️ 4-5 rounds are enough when done correctly. Don\'t force it.';
                if(!running && !countdownActive){
                    phaseLabel.textContent=t('ready');
                    timerDisplay.textContent=timeLeft;
                    roundCounter.textContent=`${t('round')} ${round}`;
                    startSub.textContent=t('startSub');
                } else {
                    startSub.textContent = lang==='hi' ? 'विराम' : 'Pause';
                }
                setQuote();
            });

            let isDark=true;
            themeToggle.addEventListener('click',()=>{
                isDark=!isDark;
                if(isDark){ document.body.classList.remove('light-mode'); themeToggle.textContent='☀️';
                    document.querySelector('meta[name="theme-color"]').content='#1a3a2a'; }
                else{ document.body.classList.add('light-mode'); themeToggle.textContent='🌙';
                    document.querySelector('meta[name="theme-color"]').content='#e8f0e4'; }
            });

            function showPwa(){
                const standalone=window.matchMedia('(display-mode:standalone)').matches||navigator.standalone;
                const iOS=/iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
                if(!standalone&&iOS&&!localStorage.getItem('pawan-pwa-v3')){
                    pwaHint.textContent=t('pwaHint'); pwaHint.classList.add('show');
                }
                const tapHint=document.getElementById('tapHint');
                if(!running && !localStorage.getItem('pawan-tap-hint')){
                    tapHint.textContent=lang==='hi'?'👆 कहीं भी टैप करें':'👆 Tap anywhere to begin';
                    tapHint.classList.add('show');
                    setTimeout(()=>tapHint.classList.remove('show'),8000);
                }
            }
            pwaHint.addEventListener('click',()=>{ pwaHint.classList.remove('show');
                localStorage.setItem('pawan-pwa-v3','true'); });
            setTimeout(()=>pwaHint.classList.remove('show'),12000);
            window.addEventListener('load',showPwa);

            const canvas=document.getElementById('particles'), ctx=canvas.getContext('2d');
            let parts=[]; const PC=60;
            function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
            window.addEventListener('resize',resize); resize();
            class Particle{
                constructor(){ this.reset(); }
                reset(){ this.x=Math.random()*canvas.width; this.y=Math.random()*canvas.height;
                    this.r=Math.random()*1.5+0.3; this.speed=Math.random()*0.28+0.08;
                    this.opacity=Math.random()*0.45+0.15; this.wobble=Math.random()*Math.PI*2; }
                update(){ this.y-=this.speed; this.wobble+=0.006;
                    this.x+=Math.sin(this.wobble)*0.18;
                    if(this.y<-10){ this.y=canvas.height+10; this.x=Math.random()*canvas.width; } }
                draw(){ ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
                    ctx.fillStyle=`rgba(210,180,130,${this.opacity})`; ctx.fill();
                    ctx.beginPath(); ctx.arc(this.x,this.y,this.r*2,0,Math.PI*2);
                    ctx.fillStyle=`rgba(210,180,130,${this.opacity*0.08})`; ctx.fill(); }
            }
            for(let i=0;i<PC;i++) parts.push(new Particle());
            function anim(){ ctx.clearRect(0,0,canvas.width,canvas.height);
                for(const p of parts){ p.update(); p.draw(); } requestAnimationFrame(anim); }
            anim();

            if('serviceWorker' in navigator){
                const sw=`const C='pawan-v5';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll([location.pathname])).then(()=>self.skipWaiting()));});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(x=>x!==C).map(x=>caches.delete(x)))).then(()=>self.clients.claim()));});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{if(res.ok){const cl=res.clone();caches.open(C).then(c=>c.put(e.request,cl));}return res;})))});`;
                const blob=new Blob([sw],{type:'application/javascript'});
                const swUrl=URL.createObjectURL(blob);
                navigator.serviceWorker.register(swUrl,{scope:location.pathname}).catch(()=>{});
            }

            setTechnique('578');
            updateAllLabels();
            setAudio();
            phaseLabel.textContent=t('ready');
            timerDisplay.textContent=INHALE;
            roundCounter.textContent=`${t('round')} 0`;
            startBtn.textContent=t('start');
            restartBtn.textContent=t('restart');
            startSub.textContent=t('startSub');
            audioIndicator.textContent=t('audioGuide');
            updateProgressRing();
        })();
    </script>
</body>
</html>
