<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#0a0f0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Vayu — A 5-7-8 breathing sanctuary. Open, breathe, come home.">
    <title>Vayu · 5-7-8 Breathing</title>
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIlZheXUiLAogICJzaG9ydF9uYW1lIjogIlZheXUiLAogICJzdGFydF91cmwiOiAiLyIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzBhMGYwZiIsCiAgInRoZW1lX2NvbG9yIjogIiMwYTBmMGYiLAogICJpY29ucyI6IFtdCn0=">
    <style>
        :root {
            --bg-deep: #060c0c;
            --gold: #d4a853;
            --gold-soft: #e8d5a3;
            --teal: #5b9e8a;
            --teal-deep: #2a5a4a;
            --white-soft: #e8e4db;
            --text: #c8c4b8;
            --orb-inhale: #b8d4c4;
            --orb-hold: #e2cf9c;
            --orb-exhale: #7aaf9e;
            --glow-inhale: rgba(180, 210, 190, 0.5);
            --glow-hold: rgba(220, 190, 130, 0.55);
            --glow-exhale: rgba(110, 170, 145, 0.45);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', 'Noto Serif', 'Noto Serif Devanagari', 'Mangal', 'Lohit Devanagari', serif;
            background: var(--bg-deep);
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: default;
        }

        canvas#particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 2rem;
            gap: 0;
        }

        /* Quotes */
        .quote-wrapper {
            text-align: center;
            max-width: 600px;
            width: 100%;
            min-height: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.2rem;
            transition: opacity 0.6s ease;
        }

        .quote-english {
            font-size: clamp(1rem, 3.2vw, 1.5rem);
            color: var(--white-soft);
            font-style: italic;
            letter-spacing: 0.4px;
            line-height: 1.5;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
            animation: quoteFadeIn 1.8s ease forwards;
        }

        .quote-hindi {
            font-size: clamp(0.95rem, 2.8vw, 1.35rem);
            color: #c0bdaa;
            letter-spacing: 0.3px;
            line-height: 1.6;
            margin-top: 0.4rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            animation: quoteFadeIn 2.2s ease forwards;
        }

        @keyframes quoteFadeIn {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Orb area */
        .orb-container {
            position: relative;
            width: min(260px, 58vw);
            height: min(260px, 58vw);
            margin: 0.5rem 0 1.4rem;
        }

        .orb {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #2a4a3f, #0e2220 70%, #060f0f);
            box-shadow: 0 0 60px rgba(100, 160, 130, 0.25), 0 0 0 1px rgba(255, 255, 240, 0.08);
            transition: transform 0.7s cubic-bezier(0.33, 0.08, 0.21, 0.94),
                box-shadow 0.7s cubic-bezier(0.33, 0.08, 0.21, 0.94),
                background 0.7s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
        }

        .orb-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            transition: all 0.7s cubic-bezier(0.33, 0.08, 0.21, 0.94);
        }

        .orb-glow.ring {
            width: 115%;
            height: 115%;
            box-shadow: 0 0 80px var(--glow-inhale);
            opacity: 0.7;
            transition: all 0.7s cubic-bezier(0.33, 0.08, 0.21, 0.94);
        }

        /* Phase states */
        .phase-inhale .orb {
            transform: scale(1.35);
            background: radial-gradient(circle at 35% 30%, #c8e0d2, #3d6b58 55%, #1a3630);
            box-shadow: 0 0 90px rgba(170, 210, 180, 0.5), 0 0 0 1px rgba(255, 255, 240, 0.18);
        }
        .phase-inhale .orb-glow.ring {
            box-shadow: 0 0 110px var(--glow-inhale);
            opacity: 0.85;
        }

        .phase-hold .orb {
            transform: scale(1.35);
            background: radial-gradient(circle at 35% 30%, #e8d8a8, #6b5a38 55%, #2a2218);
            box-shadow: 0 0 100px rgba(210, 170, 100, 0.55), 0 0 0 1px rgba(255, 250, 220, 0.2);
        }
        .phase-hold .orb-glow.ring {
            box-shadow: 0 0 120px var(--glow-hold);
            opacity: 0.9;
        }

        .phase-exhale .orb {
            transform: scale(0.88);
            background: radial-gradient(circle at 35% 30%, #8cb8a5, #1f4a3a 55%, #0a1f18);
            box-shadow: 0 0 55px rgba(90, 150, 130, 0.4), 0 0 0 1px rgba(255, 255, 240, 0.1);
        }
        .phase-exhale .orb-glow.ring {
            box-shadow: 0 0 70px var(--glow-exhale);
            opacity: 0.6;
        }

        .phase-text {
            color: #f0ece0;
            font-size: clamp(0.9rem, 2.2vw, 1.2rem);
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
            text-shadow: 0 2px 15px rgba(0, 0, 0, 0.7);
            z-index: 5;
            transition: opacity 0.3s;
        }

        /* Timer */
        .timer {
            font-size: clamp(2.8rem, 8vw, 4.5rem);
            font-weight: 300;
            color: #f2efe4;
            letter-spacing: 6px;
            text-shadow: 0 0 40px rgba(200, 180, 140, 0.6);
            margin: 0.2rem 0 0.6rem;
            font-variant-numeric: tabular-nums;
            font-family: 'Georgia', 'Times New Roman', serif;
        }

        .round-counter {
            font-size: 0.85rem;
            color: #a09880;
            letter-spacing: 2px;
            margin-bottom: 1rem;
        }

        /* Controls */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: center;
            justify-content: center;
        }

        .btn {
            background: rgba(255, 255, 245, 0.05);
            border: 1px solid rgba(255, 255, 240, 0.18);
            color: #d4cfbf;
            padding: 0.7rem 1.5rem;
            border-radius: 40px;
            font-size: 0.9rem;
            letter-spacing: 0.8px;
            cursor: pointer;
            transition: all 0.35s ease;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            font-family: inherit;
            white-space: nowrap;
        }

        .btn:hover {
            background: rgba(255, 255, 245, 0.12);
            border-color: rgba(255, 255, 240, 0.35);
        }
        .btn.active-mode {
            background: rgba(200, 220, 200, 0.18);
            border-color: rgba(200, 220, 190, 0.5);
            color: #f6f3e8;
            box-shadow: 0 0 25px rgba(140, 180, 150, 0.25);
        }

        .btn-start {
            background: rgba(210, 180, 130, 0.15);
            border-color: rgba(210, 180, 130, 0.45);
            color: #f8f3e0;
            font-size: 1rem;
            padding: 0.8rem 2.4rem;
            letter-spacing: 1.5px;
            font-weight: 600;
            box-shadow: 0 0 35px rgba(180, 140, 80, 0.2);
        }
        .btn-start:hover {
            background: rgba(220, 190, 140, 0.25);
            box-shadow: 0 0 50px rgba(190, 150, 90, 0.35);
        }

        .audio-indicator {
            font-size: 0.75rem;
            color: #8a8570;
            letter-spacing: 1px;
            margin-top: 0.3rem;
            min-height: 18px;
            transition: opacity 0.4s;
        }

        @media (max-width: 480px) {
            .container {
                padding: 1rem;
            }
            .btn {
                padding: 0.55rem 1.1rem;
                font-size: 0.8rem;
            }
            .btn-start {
                padding: 0.65rem 1.8rem;
                font-size: 0.9rem;
            }
            .orb-container {
                width: min(210px, 55vw);
                height: min(210px, 55vw);
                margin: 0.3rem 0 1rem;
            }
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>

    <div class="container" id="app">
        <!-- Quotes -->
        <div class="quote-wrapper" id="quoteWrapper">
            <div class="quote-english" id="quoteEn"></div>
            <div class="quote-hindi" id="quoteHi"></div>
        </div>

        <!-- Orb -->
        <div class="orb-container" id="orbContainer">
            <div class="orb-glow ring" id="orbRing"></div>
            <div class="orb" id="orb">
                <span class="phase-text" id="phaseLabel">READY</span>
            </div>
        </div>

        <!-- Timer -->
        <div class="timer" id="timerDisplay">5</div>
        <div class="round-counter" id="roundCounter">Round 0</div>

        <!-- Controls -->
        <div class="controls">
            <button class="btn active-mode" id="visualModeBtn">👁️ Visual</button>
            <button class="btn" id="audioModeBtn">🎧 Audio</button>
        </div>
        <button class="btn btn-start" id="startBtn">🌿 Begin</button>
        <div class="audio-indicator" id="audioIndicator"></div>
    </div>

    <script>
        (function() {
            // ─────────────────────────────────────
            // VAYU · 5-7-8 Breathing Sanctuary
            // Flawless sync · Offline · Universal
            // ─────────────────────────────────────

            // ── Quotes Pool (curated, diverse, peaceful) ──
            const quotes = [
                { en: "Peace comes from within. Do not seek it without.", hi: "शांति भीतर से आती है, उसे बाहर मत खोजो।" },
                { en: "The present moment is filled with joy and happiness. If you are attentive, you will see it.",
                    hi: "वर्तमान क्षण आनंद से भरा है। यदि आप ध्यान दें, तो इसे देख लेंगे।" },
                { en: "Feelings come and go like clouds in a windy sky. Conscious breathing is my anchor.",
                    hi: "भावनाएँ हवादार आकाश में बादलों की तरह आती-जाती हैं। सचेत श्वास मेरा सहारा है।" },
                { en: "Within you, there is a stillness and a sanctuary to which you can retreat at any time.",
                    hi: "आपके भीतर एक शांति और एक अभयारण्य है, जहाँ आप कभी भी जा सकते हैं।" },
                { en: "Be happy in the moment, that's enough. Each moment is all we need.",
                    hi: "इस पल में खुश रहो, बस इतना ही काफी है। हर पल हमें वही देता है जो चाहिए।" },
                { en: "The quieter you become, the more you can hear.", hi: "जितने शांत होते हैं, उतना ही अधिक सुन पाते हैं।" },
                { en: "Let go of what you think should happen and embrace what is.",
                    hi: "जो सोचते हैं होना चाहिए, उसे छोड़ें और जो है उसे अपनाएँ।" },
                { en: "You are the sky. Everything else is just the weather.",
                    hi: "आप आकाश हैं। बाकी सब सिर्फ मौसम है।" },
                { en: "Inhale courage. Exhale fear.", hi: "साँस लें साहस। साँस छोड़ें भय।" },
                { en: "This too shall pass. Just breathe.", hi: "यह भी बीत जाएगा। बस साँस लें।" },
            ];

            function getRandomQuotes() {
                const shuffled = [...quotes].sort(() => Math.random() - 0.5);
                return shuffled.slice(0, 1)[0];
            }

            function setRandomQuote() {
                const q = getRandomQuotes();
                const enEl = document.getElementById('quoteEn');
                const hiEl = document.getElementById('quoteHi');
                enEl.style.animation = 'none';
                hiEl.style.animation = 'none';
                enEl.offsetHeight;
                hiEl.offsetHeight;
                enEl.textContent = `"${q.en}"`;
                hiEl.textContent = `"${q.hi}"`;
                enEl.style.animation = 'quoteFadeIn 1.8s ease forwards';
                hiEl.style.animation = 'quoteFadeIn 2.2s ease forwards';
            }

            setRandomQuote();

            // ── Constants ──
            const INHALE = 5;
            const HOLD = 7;
            const EXHALE = 8;

            // ── State ──
            let phase = 'inhale';
            let timeLeft = INHALE;
            let round = 0;
            let running = false;
            let timerId = null;
            let mode = 'visual';
            let audioCtx = null;
            let speechSynth = window.speechSynthesis;

            // ── DOM refs ──
            const orbContainer = document.getElementById('orbContainer');
            const orb = document.getElementById('orb');
            const orbRing = document.getElementById('orbRing');
            const phaseLabel = document.getElementById('phaseLabel');
            const timerDisplay = document.getElementById('timerDisplay');
            const roundCounter = document.getElementById('roundCounter');
            const startBtn = document.getElementById('startBtn');
            const visualBtn = document.getElementById('visualModeBtn');
            const audioBtn = document.getElementById('audioModeBtn');
            const audioIndicator = document.getElementById('audioIndicator');
            const app = document.getElementById('app');

            // ── Audio setup ──
            function initAudio() {
                if (!audioCtx) {
                    try {
                        audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    } catch (e) {}
                }
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            }

            function playTone(freq, dur, vol = 0.08, type = 'sine') {
                if (!audioCtx) return;
                try {
                    const t = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, t);
                    gain.gain.setValueAtTime(vol, t);
                    gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(t);
                    osc.stop(t + dur);
                } catch (e) {}
            }

            function playPhaseChime(p) {
                if (p === 'inhale') { playTone(440, 0.35, 0.1, 'sine');
                    setTimeout(() => playTone(520, 0.3, 0.07, 'sine'), 120); } else if (p === 'hold') { playTone(587, 0.3,
                        0.09, 'triangle');
                    setTimeout(() => playTone(660, 0.25, 0.06, 'sine'), 100); } else if (p === 'exhale') { playTone(392, 0.4,
                        0.09, 'sine');
                    setTimeout(() => playTone(330, 0.35, 0.07, 'sine'), 150); }
            }

            function speakWord(word) {
                if (!speechSynth) return;
                speechSynth.cancel();
                const u = new SpeechSynthesisUtterance(word);
                u.lang = 'en-US';
                u.rate = 0.85;
                u.pitch = 1.05;
                u.volume = 0.9;
                speechSynth.speak(u);
            }

            // ── UI updates ──
            function updateUI() {
                timerDisplay.textContent = timeLeft;
                roundCounter.textContent = `Round ${round}`;
                orbContainer.classList.remove('phase-inhale', 'phase-hold', 'phase-exhale');
                if (phase === 'inhale') {
                    orbContainer.classList.add('phase-inhale');
                    phaseLabel.textContent = 'Inhale';
                } else if (phase === 'hold') {
                    orbContainer.classList.add('phase-hold');
                    phaseLabel.textContent = 'Hold';
                } else {
                    orbContainer.classList.add('phase-exhale');
                    phaseLabel.textContent = 'Exhale';
                }
            }

            function setPhaseAudioCues(p) {
                playPhaseChime(p);
                if (p === 'inhale') speakWord('Breathe in');
                else if (p === 'hold') speakWord('Hold');
                else speakWord('Breathe out');
                if (mode === 'audio') {
                    audioIndicator.textContent = '🎧 Eyes closed · Voice guiding';
                }
            }

            // ── Phase transition ──
            function nextPhase() {
                if (phase === 'inhale') { phase = 'hold';
                    timeLeft = HOLD; } else if (phase === 'hold') { phase = 'exhale';
                    timeLeft = EXHALE; } else { phase = 'inhale';
                    timeLeft = INHALE;
                    round++; }
                updateUI();
                if (running) setPhaseAudioCues(phase);
            }

            function tick() {
                if (!running) return;
                timeLeft--;
                updateUI();
                if (timeLeft <= 0) nextPhase();
            }

            // ── Start / Stop ──
            function start() {
                if (running) return;
                initAudio();
                running = true;
                startBtn.textContent = '⏸️ Pause';
                updateUI();
                setPhaseAudioCues(phase);
                if (timerId) clearInterval(timerId);
                timerId = setInterval(tick, 1000);
            }

            function pause() {
                if (!running) return;
                running = false;
                if (timerId) { clearInterval(timerId);
                    timerId = null; }
                startBtn.textContent = '🌿 Resume';
                if (speechSynth) speechSynth.cancel();
                audioIndicator.textContent = '';
            }

            function resetAll() {
                pause();
                phase = 'inhale';
                timeLeft = INHALE;
                round = 0;
                updateUI();
                orbContainer.classList.remove('phase-inhale', 'phase-hold', 'phase-exhale');
                phaseLabel.textContent = 'READY';
                timerDisplay.textContent = INHALE;
                roundCounter.textContent = 'Round 0';
                startBtn.textContent = '🌿 Begin';
                audioIndicator.textContent = '';
            }

            startBtn.addEventListener('click', () => {
                if (running) pause();
                else start();
            });

            // ── Mode switching ──
            function setVisual() {
                mode = 'visual';
                visualBtn.classList.add('active-mode');
                audioBtn.classList.remove('active-mode');
                audioIndicator.textContent = '';
                if (running && speechSynth) speechSynth.cancel();
                orb.style.opacity = '1';
                orbRing.style.opacity = '1';
                phaseLabel.style.opacity = '1';
            }

            function setAudio() {
                mode = 'audio';
                audioBtn.classList.add('active-mode');
                visualBtn.classList.remove('active-mode');
                audioIndicator.textContent = '🎧 Close your eyes · Voice + tone guide';
                if (running) {
                    if (phase === 'inhale') speakWord('Inhale deeply');
                    else if (phase === 'hold') speakWord('Hold gently');
                    else speakWord('Exhale slowly');
                }
            }

            visualBtn.addEventListener('click', setVisual);
            audioBtn.addEventListener('click', setAudio);

            // ── Particles Canvas ──
            const canvas = document.getElementById('particles');
            const ctx = canvas.getContext('2d');
            let particlesArr = [];
            const PARTICLE_COUNT = 70;

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            class Particle {
                constructor() {
                    this.reset();
                }
                reset() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.r = Math.random() * 1.8 + 0.4;
                    this.speed = Math.random() * 0.35 + 0.12;
                    this.opacity = Math.random() * 0.55 + 0.2;
                    this.wobble = Math.random() * Math.PI * 2;
                }
                update() {
                    this.y -= this.speed;
                    this.wobble += 0.008;
                    this.x += Math.sin(this.wobble) * 0.25;
                    if (this.y < -10) { this.y = canvas.height + 10;
                        this.x = Math.random() * canvas.width; }
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(210,180,130,${this.opacity})`;
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.r * 2.5, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(210,180,130,${this.opacity * 0.12})`;
                    ctx.fill();
                }
            }

            for (let i = 0; i < PARTICLE_COUNT; i++) particlesArr.push(new Particle());

            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (const p of particlesArr) { p.update();
                    p.draw(); }
                requestAnimationFrame(animateParticles);
            }
            animateParticles();

            // ── Service Worker Registration ──
            if ('serviceWorker' in navigator) {
                const swCode = `
            const CACHE = 'vayu-v2';
            const URLS = ['/'];
            self.addEventListener('install', e => {
              e.waitUntil(caches.open(CACHE).then(c => c.addAll(URLS)).then(() => self.skipWaiting()));
            });
            self.addEventListener('activate', e => {
              e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))).then(() => self.clients.claim()));
            });
            self.addEventListener('fetch', e => {
              e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).then(res => {
                if(res.ok){ const clone = res.clone(); caches.open(CACHE).then(c => c.put(e.request, clone)); }
                return res;
              })));
            });
          `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(swUrl).catch(() => {});
            }

            // ── Initial state ──
            updateUI();
            phaseLabel.textContent = 'READY';
            timerDisplay.textContent = INHALE;
            roundCounter.textContent = 'Round 0';
            startBtn.textContent = '🌿 Begin';
            setVisual();
        })();
    </script>
</body>
</html>
